spring.application.name=BlackHorse-backend
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:blackhorse;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:change-me}
app.jwt.secret=${JWT_SECRET:black-horse-development-secret-change-me}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.seed.mock-data=${SEED_MOCK_DATA:true}
